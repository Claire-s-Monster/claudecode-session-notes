version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # TODO: Add health checks
    # TODO: Add initialization scripts if needed

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # TODO: Add Redis configuration file mounting
    # TODO: Add health checks
    # TODO: Configure Redis authentication if needed
    # TODO: Add memory limits and other performance tuning

volumes:
  postgres_data:
  redis_data:

