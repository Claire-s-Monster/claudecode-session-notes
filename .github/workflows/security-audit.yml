name: Security Audit - Daily Monitoring

# Daily comprehensive security scanning and dependency monitoring
# Runs independently of main CI for continuous security vigilance

permissions:
  contents: read
  security-events: write
  issues: write

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      scan_depth:
        description: 'Security scan depth'
        required: false
        default: 'standard'
        type: choice
        options:
          - 'quick'
          - 'standard'
          - 'comprehensive'

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.50.2

jobs:
  security-audit:
    name: "Daily Security Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PIXI
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true

      - name: Install quality-extended environment
        run: |
          pixi install -e quality-extended
          pixi run -e quality-extended dev-setup

      - name: Comprehensive security scan
        run: |
          echo "=== Daily Security Audit $(date) ==="

          # Bandit - Python security issues
          echo "Running Bandit security analysis..."
          pixi run -e quality-extended bandit -r src/ -f sarif -o bandit-daily.sarif || true
          pixi run -e quality-extended bandit -r src/ -f txt

          # Safety - Known vulnerabilities
          echo "Checking for known vulnerabilities..."
          pixi run -e quality-extended safety check --json --output safety-daily.json || true
          pixi run -e quality-extended safety check

          # pip-audit - Additional security auditing
          echo "Running pip-audit..."
          pixi run -e quality-extended pip-audit --format sarif --output pip-audit-daily.sarif || true
          pixi run -e quality-extended pip-audit

      - name: Dependency freshness check
        run: |
          echo "Checking dependency freshness..."
          pixi list --platform linux-64 > dependencies-current.txt

          # Create summary report
          echo "# Security Audit Report - $(date)" > security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "- Bandit: $([ -f bandit-daily.sarif ] && echo 'Completed' || echo 'Failed')" >> security-report.md
          echo "- Safety: $([ -f safety-daily.json ] && echo 'Completed' || echo 'Failed')" >> security-report.md
          echo "- pip-audit: $([ -f pip-audit-daily.sarif ] && echo 'Completed' || echo 'Failed')" >> security-report.md

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: |
            bandit-daily.sarif
            pip-audit-daily.sarif
        continue-on-error: true

      - name: Archive security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_number }}
          path: |
            bandit-daily.sarif
            safety-daily.json
            pip-audit-daily.sarif
            security-report.md
            dependencies-current.txt
          retention-days: 90
