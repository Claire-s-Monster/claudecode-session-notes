name: CI Pipeline - Session Notes FastMCP 2.0 (Emergency Simplified)

# EMERGENCY SIMPLIFIED CI - Focused on reliability over optimization
# Single environment, no complex scripting, minimal viable configuration

permissions:
  contents: read
  checks: write          # For test reporting
  pull-requests: write   # For PR comments

on:
  push:
    branches: [main, develop, feature/*, fix/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.50.2
  PYTHON_VERSION: "3.12"
  # Simplified PIXI optimizations
  PIXI_NO_PROGRESS: true
  PYTHONUNBUFFERED: 1

jobs:
  # =============================================================================
  # SINGLE UNIFIED JOB - EMERGENCY SIMPLIFICATION
  # =============================================================================
  ci:
    name: "CI Tests and Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PIXI
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-key: "emergency-ci-${{ hashFiles('pixi.lock') }}"
          post-cleanup: "none"

      - name: Validate PIXI project structure
        timeout-minutes: 2
        run: |
          echo "🔍 PIXI Project Structure Validation"
          if [ ! -f "pyproject.toml" ]; then
            echo "❌ No pyproject.toml found"
            exit 1
          fi

          if ! grep -q '\[tool\.pixi\.project\]' pyproject.toml; then
            echo "❌ No PIXI project configuration found"
            exit 1
          fi

          echo "📋 PIXI Version: $(pixi --version)"
          echo "🏗️ Project validation passed"

      - name: Install quality environment with retry
        timeout-minutes: 15
        run: |
          echo "📦 Installing quality environment (emergency simplified)"

          # Simple retry logic without complex scripting
          attempt=1
          max_attempts=3

          while [ $attempt -le $max_attempts ]; do
            echo "🔄 Installation attempt $attempt/$max_attempts"

            if pixi install -e quality; then
              echo "✅ Quality environment installed successfully"
              break
            else
              echo "❌ Installation failed (attempt $attempt)"
              if [ $attempt -lt $max_attempts ]; then
                echo "🧹 Cleaning for retry..."
                rm -rf .pixi/envs/quality || true
                sleep 5
              else
                echo "💥 All installation attempts failed"
                exit 1
              fi
            fi

            attempt=$((attempt + 1))
          done

      - name: Verify environment health
        timeout-minutes: 2
        run: |
          echo "🔍 Environment health check"
          pixi run -e quality python --version
          pixi run -e quality python -c "import sys; print('Python executable:', sys.executable)"
          echo "✅ Environment health verified"

      - name: Run tests
        timeout-minutes: 5
        run: |
          echo "🧪 Running test suite"
          pixi run -e quality test
          echo "✅ Tests completed"

      - name: Run linting
        timeout-minutes: 3
        run: |
          echo "🔍 Running linting checks"
          pixi run -e quality lint
          echo "✅ Linting completed"

      - name: Run type checking
        timeout-minutes: 3
        run: |
          echo "🏷️ Running type checking"
          pixi run -e quality ci-typecheck
          echo "✅ Type checking completed"

      - name: Run code formatting check
        timeout-minutes: 2
        run: |
          echo "📝 Checking code formatting"
          pixi run -e quality format-check
          echo "✅ Code formatting verified"

      - name: Generate test coverage
        timeout-minutes: 5
        run: |
          echo "📊 Generating test coverage"
          pixi run -e quality test-cov
          echo "✅ Coverage report generated"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.xml
            .coverage
            htmlcov/
          retention-days: 7

      - name: Basic MCP server validation
        timeout-minutes: 3
        run: |
          echo "🔍 Testing basic MCP server functionality"
          # Basic import test
          pixi run -e quality python -c "
          import sys
          sys.path.insert(0, 'src')
          try:
              from session_notes.server import app
              print('✅ MCP server imports successfully')
          except Exception as e:
              print(f'❌ MCP server import failed: {e}')
              sys.exit(1)
          "
          echo "✅ MCP server validation completed"

  # =============================================================================
  # EMERGENCY STATUS - SINGLE JOB SUCCESS
  # =============================================================================
  status:
    name: "Emergency CI Status"
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "=== Emergency CI Status ==="
          echo "CI Job: ${{ needs.ci.result }}"

          if [[ "${{ needs.ci.result }}" == "success" ]]; then
            echo "🎉 Emergency CI pipeline passed!"
            echo "✅ Basic quality gates verified"
            echo "📋 Ready for enhanced CI once stabilized"
          else
            echo "❌ Emergency CI failed - investigate basic issues first"
            exit 1
          fi
